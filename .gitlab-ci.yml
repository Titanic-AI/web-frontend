stages:
  - test
  - build

# ─────────────────────────────────────────────────────
# 1. Unit & Integration Tests (React Testing Library / Jest)
# ─────────────────────────────────────────────────────
unit-tests:
  image: node:20
  stage: test
  script:
    - npm ci
    - npm run test -- --coverage --ci --reporters=default --reporters=jest-junit
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - coverage/
  only:
    - main
    - merge_requests

# ─────────────────────────────────────────────────────
# 2. Build & Push Docker Image to GitLab Container Registry
# ─────────────────────────────────────────────────────
build-frontend:
  image: docker:latest
  services:
    - docker:dind
  stage: build
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  only:
    - main
