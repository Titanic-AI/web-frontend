stages:
  - test
  - build

unit-tests:
  image: node:20
  stage: test
  script:
    - npm ci
    - npm run test
  artifacts:
    paths:
      - coverage/
    when: always
  only:
    - main
    - merge_requests

build-frontend:
  image: docker:latest
  services:
    - docker:dind
  stage: build
  variables:
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
  only:
    - main
